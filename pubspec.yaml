name: yusrilpdf
description: "Yusril PDF Tools - Complete PDF manipulation app with 29 features"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # Core & Navigation
  get: ^4.6.6
  provider: ^6.1.2
  cupertino_icons: ^1.0.8

  # PDF Processing & Viewing
  syncfusion_flutter_pdf: ^27.1.48
  pdf: ^3.11.1
  printing: ^5.14.1
  pdfx: ^2.9.0

  # File Management
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  path: ^1.9.1
  share_plus: ^10.1.4
  open_file: ^3.5.10
  permission_handler: ^11.4.0

  # Camera & Scanning
  camera: ^0.11.1
  image_picker: ^1.1.2
  image: ^4.3.0

  # OCR & ML Kit
  google_mlkit_text_recognition: ^0.13.1
  google_mlkit_object_detection: ^0.13.0
  edge_detection: ^1.1.3

  # Storage & Local DB
  shared_preferences: ^2.3.5

  # Network & Translation
  http: ^1.3.0
  translator: ^1.0.1

  # UI & UX
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  lottie: ^3.3.1
  flutter_svg: ^2.0.17
  dotted_border: ^2.1.0
  cached_network_image: ^3.4.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
